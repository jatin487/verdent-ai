[build]
  # The directory to change to before starting a build.
  # This is where we'll look for package.json/.nvmrc/etc.
  base = "frontend"

  # The command that will build the site.
  # This is relative to the base directory.
  command = "npm run build"

  # The directory that contains the deploy-ready HTML files and assets.
  # This is relative to the base directory.
  publish = "dist"

# Add any additional environment variables if needed
[build.environment]
  NODE_VERSION = "20"
